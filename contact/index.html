<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Phoenix Technology Solutions</title>

  <link rel="icon" href="../assets/img/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="../assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-grey: #1E1F24;
      --bg-grey-2: #18191E;
      --card-grey: #25262C;
      --card-grey-dark: #202126;
      --card-grey-soft: #2B2D34;
      --stroke: #34363D;
      --stroke-strong: #434650;
      --text-primary: #FFFFFF;
      --text-secondary: #C8C9CE;
      --text-muted: #9DA1AA;
      --accent: #A78BFA;
      --accent-strong: #7C3AED;
      --accent-glow: rgba(167, 139, 250, 0.24);
      --success: #B794F4;
      --danger: #FF6B6B;
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.35);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 1180px;
      --form-max-width: 760px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.10), transparent 24%),
        linear-gradient(180deg, #1E1F24 0%, #1A1B20 45%, #17181C 100%);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }

    a { color: inherit; }

    .container {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
    }

    .site-shell {
      position: relative;
      overflow: hidden;
    }

    .site-shell::before,
    .site-shell::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(40px);
      opacity: 0.55;
      z-index: 0;
    }

    .site-shell::before {
      width: 340px;
      height: 340px;
      top: -80px;
      right: -100px;
      background: rgba(124, 58, 237, 0.16);
    }

    .site-shell::after {
      width: 260px;
      height: 260px;
      bottom: 8%;
      left: -80px;
      background: rgba(167, 139, 250, 0.10);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(16px);
      background: rgba(30, 31, 36, 0.78);
      border-bottom: 1px solid rgba(52, 54, 61, 0.9);
    }

    .headerRow {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      min-width: 0;
    }

    .brandMark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(167, 139, 250, 0.14), rgba(167, 139, 250, 0.04));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 4px rgba(167, 139, 250, 0.05);
      flex-shrink: 0;
    }

    .brandMark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brandText {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }

    .brandTitle {
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: var(--text-primary);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav a {
      text-decoration: none;
      color: var(--text-secondary);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .nav a:hover,
    .nav a[aria-current="page"] {
      color: var(--text-primary);
      background: rgba(167, 139, 250, 0.10);
      box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.18);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 18px;
      border: none;
      border-radius: 14px;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btnPrimary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.26);
    }

    .btnPrimary:hover {
      box-shadow: 0 16px 28px rgba(124, 58, 237, 0.32);
    }

    .btnGhost {
      color: var(--text-primary);
      background: rgba(37, 38, 44, 0.78);
      border: 1px solid var(--stroke);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .btnGhost:hover {
      background: rgba(43, 45, 52, 0.95);
      border-color: var(--stroke-strong);
    }

    main {
      position: relative;
      z-index: 1;
    }

    .contactSection {
      padding: 36px 0 78px;
    }

    .contactSectionSolo {
      min-height: calc(100vh - 220px);
      display: flex;
      align-items: center;
    }

    .contactWrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .contactCard {
      width: 100%;
      max-width: var(--form-max-width);
    }

    .card {
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(37, 38, 44, 0.95), rgba(32, 33, 38, 0.98));
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .cardBody {
      padding: 30px;
    }

    .cardTitle {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.1;
      letter-spacing: -0.04em;
      text-align: center;
    }

    .cardText {
      margin: 10px auto 0;
      color: var(--text-secondary);
      font-size: 0.98rem;
      text-align: center;
      max-width: 44ch;
    }

    .formGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
    }

    .input,
    textarea {
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(32, 33, 38, 1), rgba(26, 27, 32, 1));
      color: var(--text-primary);
      padding: 15px 16px;
      font-family: inherit;
      font-size: 0.97rem;
      line-height: 1.5;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .input::placeholder,
    textarea::placeholder {
      color: #8D9199;
    }

    .input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(167, 139, 250, 0.62);
      box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.14);
    }

    textarea {
      min-height: 148px;
      resize: vertical;
    }

    .formActions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    #submit-btn {
      min-width: 220px;
    }

    #form-status {
      display: none;
      margin-top: 28px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      border: 1px solid transparent;
      background: rgba(167, 139, 250, 0.08);
      color: var(--success);
      text-align: center;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      padding: 34px 0 46px;
      border-top: 1px solid var(--stroke);
      background: rgba(23, 24, 28, 0.94);
    }

    .footerGrid {
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    .footerTitle {
      color: var(--text-primary);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .footerText,
    .footerLinks a,
    .footerMeta {
      color: var(--text-secondary);
      font-size: 0.94rem;
      text-decoration: none;
    }

    .footerLinks {
      display: grid;
      gap: 10px;
    }

    .footerLinks a:hover {
      color: var(--accent);
    }

    .footerMeta {
      margin-top: 14px;
      color: var(--text-muted);
    }

    @media (max-width: 780px) {
      .headerRow {
        min-height: auto;
        padding: 16px 0;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: center;
      }

      .cardBody {
        padding: 22px;
      }

      .formGrid,
      .footerGrid {
        grid-template-columns: 1fr;
      }

      .formActions {
        flex-direction: column;
        align-items: stretch;
      }

      #submit-btn,
      .formActions .btn {
        width: 100%;
        min-width: 0;
      }
    }

    @media (max-width: 560px) {
      .container {
        width: min(var(--max-width), calc(100% - 20px));
      }

      .nav {
        gap: 6px;
      }

      .nav a {
        padding: 9px 12px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="header">
      <div class="container headerRow">
        <a class="brand" href="../" aria-label="Phoenix Technology Solutions Home">
          <span class="brandMark">
            <img src="../assets/img/logo.png" alt="Phoenix Tech logo" />
          </span>
          <span class="brandText">
            <span class="brandTitle">PHOENIX TECH SOLUTIONS</span>
          </span>
        </a>

        <nav class="nav" aria-label="Primary navigation">
          <a href="../">Home</a>
          <a href="../services/">Services</a>
          <a href="../shop/">Shop</a>
          <a href="../about/">About</a>
          <a href="../contact/" aria-current="page">Contact</a>
        </nav>

        <div class="actions">
          <a class="btn btnGhost" href="tel:18633202101">Call</a>
          <a class="btn btnPrimary" href="../shop/">Shop</a>
        </div>
      </div>
    </header>

    <main>
      <section class="contactSection contactSectionSolo">
        <div class="container contactWrap">
          <section class="card contactCard" aria-labelledby="contact-form-title">
            <div class="cardBody">
              <h2 class="cardTitle" id="contact-form-title">Send a message</h2>
              <p class="cardText">
                Tell us what you need and we’ll get back to you as soon as possible.
              </p>

              <form id="contact-form" novalidate>
                <div class="formGrid">
                  <div class="field">
                    <label for="name">Your Name</label>
                    <input class="input" id="name" type="text" name="name" placeholder="Enter your name" required />
                  </div>

                  <div class="field">
                    <label for="email">Email Address</label>
                    <input class="input" id="email" type="email" name="email" placeholder="Enter your email" required />
                  </div>

                  <div class="field full">
                    <label for="city">City</label>
                    <input class="input" id="city" type="text" name="city" placeholder="City (optional)" />
                  </div>

                  <div class="field full">
                    <label for="message">How can we help?</label>
                    <textarea id="message" name="message" placeholder="Tell us about the issue, service request, or project." required></textarea>
                  </div>
                </div>

                <div class="formActions">
                  <button id="submit-btn" class="btn btnPrimary" type="submit">Send Message</button>
                  <a class="btn btnGhost" href="tel:18633202101">Call Instead</a>
                </div>

                <div id="form-status" aria-live="polite"></div>
              </form>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer>
      <div class="container footerGrid">
        <div>
          <div class="footerTitle">Phoenix Technology Solutions</div>
          <div class="footerText">Serving Central Florida Since 2026</div>
        </div>

        <div>
          <div class="footerTitle">Links</div>
          <div class="footerLinks">
            <a href="../">Home</a>
            <a href="../services/">Services</a>
            <a href="../shop/">Shop</a>
            <a href="../about/">About</a>
          </div>
        </div>

        <div>
          <div class="footerTitle">Contact</div>
          <div class="footerLinks">
            <a href="tel:18633202101">(863) 320-2101</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");
    const btn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      btn.disabled = true;
      btn.innerText = "Sending...";

      const data = new FormData(event.target);

      fetch("https://formspree.io/f/xyklkban", {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          status.style.display = "block";
          status.style.color = "#E9DDFF";
          status.style.borderColor = "rgba(167, 139, 250, 0.28)";
          status.style.background = "rgba(167, 139, 250, 0.12)";
          status.innerHTML = "Success! Your message has been sent.";
          form.reset();
          btn.innerText = "Message Sent";
        } else {
          response.json().then(() => {
            status.style.display = "block";
            status.style.color = "#FFD2D2";
            status.style.borderColor = "rgba(255, 107, 107, 0.28)";
            status.style.background = "rgba(255, 107, 107, 0.10)";
            status.innerHTML = "Oops! There was a problem submitting your form.";
            btn.disabled = false;
            btn.innerText = "Try Again";
          });
        }
      }).catch(() => {
        status.style.display = "block";
        status.style.color = "#FFD2D2";
        status.style.borderColor = "rgba(255, 107, 107, 0.28)";
        status.style.background = "rgba(255, 107, 107, 0.10)";
        status.innerHTML = "Oops! Connection error.";
        btn.disabled = false;
        btn.innerText = "Try Again";
      });
    });
  </script>
</body>
</html>
